<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2048 Glassmorphism</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(-45deg, #0f172a, #312e81, #1e1b4b, #0f172a);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            overflow: hidden;
            touch-action: none;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .game-board {
            position: relative;
            width: 330px;
            height: 330px;
            padding: 10px;
            border-radius: 16px;
            margin: 0 auto;
        }

        .grid-cell {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
            float: left;
            margin: 5px;
        }

        .tile {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: 800;
            transition: transform 0.15s ease-in-out;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            user-select: none;
        }

        /* Vibrant Gradients for Tiles */
        .tile-2 { background: linear-gradient(135deg, #60A5FA, #3B82F6); }
        .tile-4 { background: linear-gradient(135deg, #34D399, #10B981); }
        .tile-8 { background: linear-gradient(135deg, #FBBF24, #F59E0B); }
        .tile-16 { background: linear-gradient(135deg, #F87171, #EF4444); }
        .tile-32 { background: linear-gradient(135deg, #EC4899, #DB2777); }
        .tile-64 { background: linear-gradient(135deg, #A78BFA, #8B5CF6); font-size: 1.8rem;}
        .tile-128 { background: linear-gradient(135deg, #F472B6, #9333EA); font-size: 1.8rem; box-shadow: 0 0 15px rgba(147, 51, 234, 0.4); }
        .tile-256 { background: linear-gradient(135deg, #38BDF8, #312E81); font-size: 1.8rem; box-shadow: 0 0 20px rgba(49, 46, 129, 0.5); }
        .tile-512 { background: linear-gradient(135deg, #FB923C, #991B1B); font-size: 1.8rem; box-shadow: 0 0 25px rgba(153, 27, 27, 0.5); }
        .tile-1024 { background: linear-gradient(135deg, #FACC15, #854D0E); font-size: 1.5rem; box-shadow: 0 0 30px rgba(133, 77, 14, 0.6); }
        .tile-2048 { background: linear-gradient(135deg, #fcd34d, #f59e0b, #b45309); font-size: 1.5rem; box-shadow: 0 0 40px rgba(245, 158, 11, 0.8); text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .tile-super { background: linear-gradient(135deg, #22d3ee, #0ea5e9, #3b82f6); font-size: 1.5rem; box-shadow: 0 0 40px rgba(14, 165, 233, 0.8); }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); box-shadow: 0 0 30px rgba(255,255,255,0.5); }
            100% { transform: scale(1); }
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .anim-pop { animation: pop 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .anim-appear { animation: appear 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94); }

        /* Custom Scrollbar for Leaderboard */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-4 flex flex-col gap-6 relative z-10">
        
        <!-- Header -->
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-5xl font-black tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-emerald-400 to-cyan-400 drop-shadow-lg">2048</h1>
                <p class="text-white/60 text-sm font-semibold mt-1 tracking-wide">Merge to win.</p>
            </div>
            <div class="flex gap-2">
                <div class="glass-panel px-4 py-2 rounded-xl flex flex-col items-center justify-center min-w-[70px]">
                    <span class="text-[10px] uppercase font-bold text-white/50">Score</span>
                    <span id="score" class="font-bold text-xl text-white">0</span>
                </div>
                <div class="glass-panel px-4 py-2 rounded-xl flex flex-col items-center justify-center min-w-[70px]">
                    <span class="text-[10px] uppercase font-bold text-white/50">Best</span>
                    <span id="best-score" class="font-bold text-xl text-white">0</span>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="flex justify-between items-center gap-4">
            <button onclick="initGame()" class="glass-panel flex-1 py-3 rounded-xl font-bold hover:bg-white/10 transition active:scale-95 text-emerald-300">
                New Game
            </button>
            <button onclick="showLeaderboard()" class="glass-panel flex-1 py-3 rounded-xl font-bold hover:bg-white/10 transition active:scale-95 text-amber-300 flex items-center justify-center gap-2">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Top Minds
            </button>
        </div>

        <!-- Game Board -->
        <div class="glass-panel game-board" id="board-bg">
            <!-- Background cells generated by JS -->
            <div id="tile-container"></div>
        </div>

    </div>

    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" class="fixed inset-0 z-50 hidden items-center justify-center px-4 bg-black/60 backdrop-blur-sm">
        <div class="glass-panel w-full max-w-sm rounded-2xl overflow-hidden flex flex-col transform transition-all shadow-2xl">
            <div class="p-6 border-b border-white/10 bg-white/5 flex justify-between items-center">
                <h2 class="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-amber-200 to-yellow-500">Top Minds</h2>
                <button onclick="closeLeaderboard()" class="text-white/50 hover:text-white transition bg-white/5 hover:bg-white/10 rounded-full p-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            
            <div class="p-4 bg-white/5 text-center text-sm font-semibold text-emerald-300 border-b border-white/5">
                Your current rank: <span id="user-rank" class="text-white text-lg ml-1 font-bold">#--</span>
            </div>

            <div id="leaderboard-list" class="p-4 max-h-[50vh] overflow-y-auto flex flex-col gap-2">
                <!-- List items generated by JS -->
            </div>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="game-over-modal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/80 backdrop-blur-md">
        <div class="glass-panel p-8 rounded-3xl text-center transform scale-100 transition-all max-w-xs w-full">
            <h2 class="text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-pink-500">Game Over</h2>
            <p class="text-white/60 font-semibold mb-6">No more moves available.</p>
            
            <div class="glass-panel p-4 rounded-xl mb-6 bg-white/5 border border-white/10">
                <div class="text-sm text-white/50 uppercase font-bold tracking-wider mb-1">Final Score</div>
                <div id="final-score" class="text-4xl font-black text-white">0</div>
            </div>

            <button onclick="closeGameOver()" class="w-full bg-gradient-to-r from-emerald-400 to-teal-500 hover:from-emerald-300 hover:to-teal-400 text-slate-900 font-bold py-4 rounded-xl shadow-lg transform transition active:scale-95 text-lg">
                Try Again
            </button>
        </div>
    </div>

    <script>
        const boardSize = 4;
        let grid = []; 
        let tiles = []; 
        let tileIdCounter = 0;
        let score = 0;
        let bestScore = localStorage.getItem('sj-2048-best') || 0;
        let isAnimating = false;

        const container = document.getElementById('tile-container');
        const boardBg = document.getElementById('board-bg');

        // Setup background grid
        for(let i=0; i<boardSize * boardSize; i++) {
            let cell = document.createElement('div');
            cell.className = 'grid-cell';
            boardBg.insertBefore(cell, container);
        }

        function initGame() {
            grid = Array.from({length: boardSize}, () => new Array(boardSize).fill(null));
            tiles = [];
            tileIdCounter = 0;
            score = 0;
            isAnimating = false;
            container.innerHTML = '';
            
            document.getElementById('score').innerText = score;
            document.getElementById('best-score').innerText = bestScore;

            addRandomTile();
            addRandomTile();
            render();
        }

        function addRandomTile() {
            let empty = [];
            for(let x=0; x<boardSize; x++) {
                for(let y=0; y<boardSize; y++) {
                    if(!grid[x][y]) empty.push({x,y});
                }
            }
            if(empty.length === 0) return;
            
            let pos = empty[Math.floor(Math.random() * empty.length)];
            let newTile = {
                id: tileIdCounter++,
                x: pos.x,
                y: pos.y,
                value: Math.random() < 0.9 ? 2 : 4,
                isNew: true,
                isMerged: false,
                deleted: false
            };
            grid[pos.x][pos.y] = newTile;
            tiles.push(newTile);
        }

        function slide(direction) {
            if(isAnimating) return;
            
            tiles.forEach(t => { t.isNew = false; t.isMerged = false; });

            const vectors = {
                'ArrowUp': {x: 0, y: -1},
                'ArrowRight': {x: 1, y: 0},
                'ArrowDown': {x: 0, y: 1},
                'ArrowLeft': {x: -1, y: 0}
            };
            const v = vectors[direction];
            if(!v) return;

            let moved = false;
            let xs = [0,1,2,3];
            let ys = [0,1,2,3];
            
            // Traverse from the edge inwards to resolve slides correctly
            if(v.x === 1) xs = xs.reverse();
            if(v.y === 1) ys = ys.reverse();

            xs.forEach(x => {
                ys.forEach(y => {
                    let tile = grid[x][y];
                    if(tile) {
                        let dest = {x, y};
                        let next = {x: x + v.x, y: y + v.y};

                        while(next.x >= 0 && next.x < boardSize && next.y >= 0 && next.y < boardSize && !grid[next.x][next.y]) {
                            dest.x = next.x;
                            dest.y = next.y;
                            next = {x: next.x + v.x, y: next.y + v.y};
                        }

                        let nextTile = null;
                        if(next.x >= 0 && next.x < boardSize && next.y >= 0 && next.y < boardSize) {
                            nextTile = grid[next.x][next.y];
                        }

                        if(nextTile && nextTile.value === tile.value && !nextTile.isMerged && !nextTile.deleted) {
                            grid[x][y] = null;
                            tile.x = nextTile.x;
                            tile.y = nextTile.y;
                            tile.deleted = true; 

                            nextTile.value *= 2;
                            nextTile.isMerged = true;
                            score += nextTile.value;
                            if(score > bestScore) {
                                bestScore = score;
                                localStorage.setItem('sj-2048-best', bestScore);
                            }
                            moved = true;
                        } else if (dest.x !== x || dest.y !== y) {
                            grid[x][y] = null;
                            grid[dest.x][dest.y] = tile;
                            tile.x = dest.x;
                            tile.y = dest.y;
                            moved = true;
                        }
                    }
                });
            });

            if(moved) {
                isAnimating = true;
                render(); 
                
                // Wait for the slide transition (0.15s) before adding new tile
                setTimeout(() => {
                    addRandomTile();
                    render(); // Render newly appeared tile & apply pop animations
                    checkGameOver();
                    isAnimating = false;
                }, 150); 
            }
        }

        function render() {
            document.getElementById('score').innerText = score;
            document.getElementById('best-score').innerText = bestScore;

            tiles.forEach(tile => {
                let el = document.getElementById('tile-' + tile.id);
                if(!el) {
                    el = document.createElement('div');
                    el.id = 'tile-' + tile.id;
                    container.appendChild(el);
                }

                let classes = ['tile', `tile-${tile.value > 2048 ? 'super' : tile.value}`];
                
                // Handle CSS animations
                if(tile.isNew) classes.push('anim-appear');
                if(tile.isMerged) {
                    classes.push('anim-pop');
                    // Need to trigger reflow to restart animation if it merged multiple times
                    el.style.animation = 'none';
                    el.offsetHeight; 
                    el.style.animation = null; 
                }

                el.className = classes.join(' ');
                el.innerText = tile.value;

                // Position calculation: Padding (10px) + offset based on coordinate
                // Cell width 70px + margin 10px (5px each side) = 80px offset
                let px = 10 + tile.x * 80;
                let py = 10 + tile.y * 80;
                
                // Z-index trick: merging tile stays on top briefly
                if (tile.isMerged) el.style.zIndex = "20";
                else if (tile.deleted) el.style.zIndex = "5";
                else el.style.zIndex = "10";

                el.style.transform = `translate(${px}px, ${py}px)`;

                if(tile.deleted) {
                    setTimeout(() => {
                        if(el.parentNode) el.remove();
                        tiles = tiles.filter(t => t.id !== tile.id);
                    }, 150); 
                }
            });
        }

        function checkGameOver() {
            for(let x=0; x<boardSize; x++)
                for(let y=0; y<boardSize; y++)
                    if(!grid[x][y]) return;

            for(let x=0; x<boardSize; x++) {
                for(let y=0; y<boardSize; y++) {
                    let v = grid[x][y].value;
                    if(x < boardSize - 1 && grid[x+1][y].value === v) return;
                    if(y < boardSize - 1 && grid[x][y+1].value === v) return;
                }
            }

            // No moves left
            setTimeout(() => {
                document.getElementById('final-score').innerText = score;
                document.getElementById('game-over-modal').classList.remove('hidden');
                document.getElementById('game-over-modal').classList.add('flex');
                
                // Execute required parent postMessage
                try {
                    window.parent.postMessage({
                        type: 'SJ_GAME_OVER', 
                        score: score, 
                        gameName: 'SJ_2048'
                    }, '*');
                } catch(e) {
                    console.error("Failed to post message", e);
                }
            }, 300);
        }

        function closeGameOver() {
            document.getElementById('game-over-modal').classList.add('hidden');
            document.getElementById('game-over-modal').classList.remove('flex');
            initGame();
        }

        // Leaderboard Logic
        function showLeaderboard() {
            // Mock data fallback if window.SJ_LEADERBOARD is missing
            const lbData = window.SJ_LEADERBOARD || [
                { name: "Alpha", score: 84200, avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Alpha" },
                { name: "Beta", score: 65120, avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Beta" },
                { name: "Gamma", score: 42000, avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Gamma" },
                { name: "Delta", score: 16400, avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Delta" },
                { name: "Epsilon", score: 8200, avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Epsilon" }
            ];

            lbData.sort((a,b) => b.score - a.score);
            let userRank = lbData.filter(e => e.score > score).length + 1;

            const listEl = document.getElementById('leaderboard-list');
            listEl.innerHTML = '';

            lbData.forEach((entry, idx) => {
                let isTop3 = idx < 3;
                let rankColor = isTop3 ? 'text-amber-400' : 'text-white/50';
                let medal = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : '';

                listEl.innerHTML += `
                    <div class="flex items-center justify-between p-3 bg-white/5 rounded-xl border border-white/5 hover:bg-white/10 hover:border-white/20 transition group">
                        <div class="flex items-center gap-3">
                            <span class="w-6 text-center font-bold ${rankColor}">${idx + 1}</span>
                            <div class="relative">
                                <img src="${entry.avatar}" alt="${entry.name}" class="w-10 h-10 rounded-full border border-white/20 bg-white/10 group-hover:scale-110 transition duration-300" />
                                ${isTop3 ? `<span class="absolute -top-2 -right-2 text-xs">${medal}</span>` : ''}
                            </div>
                            <span class="font-bold text-white tracking-wide">${entry.name}</span>
                        </div>
                        <div class="font-black text-emerald-400 font-mono tracking-tighter text-lg">${entry.score.toLocaleString()}</div>
                    </div>
                `;
            });

            document.getElementById('user-rank').innerText = `#${userRank}`;
            document.getElementById('leaderboard-modal').classList.remove('hidden');
            document.getElementById('leaderboard-modal').classList.add('flex');
        }

        function closeLeaderboard() {
            document.getElementById('leaderboard-modal').classList.add('hidden');
            document.getElementById('leaderboard-modal').classList.remove('flex');
        }

        // Event Listeners
        document.addEventListener('keydown', e => {
            if(['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
                e.preventDefault(); 
                slide(e.key);
            }
        });

        // Touch swipe support
        let touchStartX = 0, touchStartY = 0;
        document.addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
            touchStartY = e.changedTouches[0].screenY;
        }, {passive: false});

        document.addEventListener('touchend', e => {
            let touchEndX = e.changedTouches[0].screenX;
            let touchEndY = e.changedTouches[0].screenY;
            
            let dx = touchEndX - touchStartX;
            let dy = touchEndY - touchStartY;
            
            if(Math.abs(dx) > Math.abs(dy)) {
                if(Math.abs(dx) > 30) slide(dx > 0 ? 'ArrowRight' : 'ArrowLeft');
            } else {
                if(Math.abs(dy) > 30) slide(dy > 0 ? 'ArrowDown' : 'ArrowUp');
            }
        }, {passive: false});

        // Prevent default scrolling on touchmove inside game board
        document.getElementById('board-bg').addEventListener('touchmove', e => e.preventDefault(), {passive: false});

        // Start
        initGame();

    </script>
</body>
</html>
