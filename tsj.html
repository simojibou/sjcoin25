<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grandmaster 3D Bullet Chess</title>
    <style>
        :root {
            --bg-base: #0f172a;
            --surface: rgba(30, 41, 59, 0.85);
            --surface-hover: rgba(51, 65, 85, 0.95);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-glow: 0 0 30px rgba(248, 250, 252, 0.3);
            --accent-glow-active: 0 0 50px rgba(56, 189, 248, 0.6);
            --accent-border: #38bdf8;
            --crown-gold: #fbbf24;
            --crown-silver: #94a3b8;
            --crown-bronze: #b45309;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-primary);
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* 3D Canvas Container */
        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI Overlays */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let clicks pass to 3D canvas */
        }

        /* Game Over Screen */
        .game-over-overlay {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .game-over-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .game-over-title {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 10px;
            text-shadow: var(--accent-glow-active);
            color: white;
            letter-spacing: -2px;
        }

        .game-over-subtitle {
            font-size: 1.5rem;
            color: var(--accent-border);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 600;
        }
        
        .controls-hint {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text-secondary);
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
    </style>
    <!-- Include Three.js for AAA 3D Graphics -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="canvas-container"></div>

    <div id="ui-layer">
    </div>

    <div id="game-over-screen" class="game-over-overlay">
        <div id="go-title" class="game-over-title">CHECKMATE</div>
        <div id="go-subtitle" class="game-over-subtitle">White Wins</div>
    </div>

    <div class="controls-hint">
        Left Click: Move Piece &nbsp; | &nbsp; Click & Drag: Rotate Camera
    </div>

    <script>
        /**
         * GLOBAL STATE & LOGIC CONFIG
         */
        const state = {
            turn: 'w',
            gameOver: false,
            selectedPiece: null
        };

        const initialSetup = [
            ['♜','♞','♝','♛','♚','♝','♞','♜'],
            ['♟','♟','♟','♟','♟','♟','♟','♟'],
            [ '','','','','','','','' ],
            [ '','','','','','','','' ],
            [ '','','','','','','','' ],
            [ '','','','','','','','' ],
            ['♙','♙','♙','♙','♙','♙','♙','♙'],
            ['♖','♘','♗','♕','♔','♗','♘','♖']
        ];

        let scene, camera, renderer, raycaster, mouse;
        const pieces = [];
        const boardSquares = [];
        const activeTweens = [];
        
        let selectionIndicator;
        
        // Camera Orbit Controls State
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let cameraSpherical = { radius: 10, theta: Math.PI / 4, phi: Math.PI / 3 };

        /**
         * INITIALIZATION
         */
        window.onload = function () {
            initThreeJS();
            initBoardAndPieces();
            initInteraction();
            animate();
        };

        function initThreeJS() {
            const container = document.getElementById('canvas-container');

            // Scene setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color('#0f172a');
            scene.fog = new THREE.FogExp2('#0f172a', 0.03);

            // Camera setup
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            updateCameraPosition();

            // Renderer setup
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Lighting (AAA Minimalist setup)
            const ambientLight = new THREE.AmbientLight('#ffffff', 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight('#e2e8f0', 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            directionalLight.shadow.camera.near = 0.5;
            directionalLight.shadow.camera.far = 50;
            const d = 6;
            directionalLight.shadow.camera.left = -d;
            directionalLight.shadow.camera.right = d;
            directionalLight.shadow.camera.top = d;
            directionalLight.shadow.camera.bottom = -d;
            scene.add(directionalLight);

            const blueFill = new THREE.PointLight('#38bdf8', 0.4, 20);
            blueFill.position.set(-5, 5, -5);
            scene.add(blueFill);

            // Raycaster
            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            // Handle Resize
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        /**
         * PROCEDURAL GENERATION (Board & Pieces)
         */
        function initBoardAndPieces() {
            // Create Board Base
            const baseGeo = new THREE.BoxGeometry(8.4, 0.4, 8.4);
            const baseMat = new THREE.MeshStandardMaterial({ 
                color: '#1e293b', 
                roughness: 0.8,
                metalness: 0.2
            });
            const boardBase = new THREE.Mesh(baseGeo, baseMat);
            boardBase.position.y = -0.25;
            boardBase.receiveShadow = true;
            scene.add(boardBase);

            // Board Squares
            const lightSquareMat = new THREE.MeshStandardMaterial({ color: '#e2e8f0', roughness: 0.4, metalness: 0.1 });
            const darkSquareMat = new THREE.MeshStandardMaterial({ color: '#64748b', roughness: 0.6, metalness: 0.1 });
            const squareGeo = new THREE.BoxGeometry(1, 0.1, 1);

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const isLight = (r + c) % 2 === 0;
                    const square = new THREE.Mesh(squareGeo, isLight ? lightSquareMat : darkSquareMat);
                    
                    square.position.set(c - 3.5, 0, r - 3.5);
                    square.receiveShadow = true;
                    
                    // Attach logic data
                    square.userData = { isSquare: true, r, c };
                    boardSquares.push(square);
                    scene.add(square);

                    // Create pieces based on layout
                    const pChar = initialSetup[r][c];
                    if (pChar !== '') {
                        createPiece(pChar, r, c);
                    }
                }
            }

            // Selection Indicator (Glowing Torus)
            const torusGeo = new THREE.TorusGeometry(0.4, 0.03, 16, 32);
            const torusMat = new THREE.MeshBasicMaterial({ color: '#38bdf8', transparent: true, opacity: 0.8 });
            selectionIndicator = new THREE.Mesh(torusGeo, torusMat);
            selectionIndicator.rotation.x = -Math.PI / 2;
            selectionIndicator.position.y = 0.06;
            selectionIndicator.visible = false;
            scene.add(selectionIndicator);
        }

        function createPiece(type, r, c) {
            const color = r < 2 ? 'b' : 'w';
            const isKing = (type === '♔' || type === '♚');

            // Generate texture dynamically from unicode char for minimalist look
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = color === 'w' ? '#f8fafc' : '#1e293b';
            ctx.fillRect(0, 0, 256, 256);
            
            ctx.font = '160px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = color === 'w' ? '#0f172a' : '#f8fafc';
            ctx.fillText(type, 128, 140); // Offset slightly for baseline
            
            // Add a subtle rim border on the texture
            ctx.strokeStyle = color === 'w' ? '#cbd5e1' : '#475569';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.arc(128, 128, 123, 0, Math.PI * 2);
            ctx.stroke();

            const texture = new THREE.CanvasTexture(canvas);
            
            // Materials
            const topMat = new THREE.MeshStandardMaterial({ 
                map: texture, 
                roughness: 0.2, 
                metalness: 0.1 
            });
            const sideMat = new THREE.MeshStandardMaterial({ 
                color: color === 'w' ? '#f8fafc' : '#1e293b', 
                roughness: 0.5, 
                metalness: 0.3 
            });

            // Geometry: A coin/token shape
            const geo = new THREE.CylinderGeometry(0.35, 0.38, 0.15, 32);
            const pieceMesh = new THREE.Mesh(geo, [sideMat, topMat, sideMat]);
            
            pieceMesh.position.set(c - 3.5, 0.125, r - 3.5);
            pieceMesh.castShadow = true;
            pieceMesh.receiveShadow = true;

            // Align texture correctly based on start side
            pieceMesh.rotation.y = color === 'b' ? Math.PI : 0; 

            pieceMesh.userData = { isPiece: true, r, c, color, type, isKing, active: true };
            pieces.push(pieceMesh);
            scene.add(pieceMesh);
        }

        /**
         * INTERACTION & CONTROLS
         */
        function initInteraction() {
            const container = document.getElementById('canvas-container');
            let isClicking = false;
            let startMouse = { x: 0, y: 0 };

            container.addEventListener('mousedown', (e) => {
                isDragging = true;
                isClicking = true;
                previousMousePosition = { x: e.clientX, y: e.clientY };
                startMouse = { x: e.clientX, y: e.clientY };
            });

            container.addEventListener('mousemove', (e) => {
                if (isDragging) {
                    const deltaX = e.clientX - previousMousePosition.x;
                    const deltaY = e.clientY - previousMousePosition.y;
                    
                    // If moved more than 5px, it's a drag, not a click
                    if (Math.abs(e.clientX - startMouse.x) > 5 || Math.abs(e.clientY - startMouse.y) > 5) {
                        isClicking = false;
                    }

                    // Rotate camera
                    cameraSpherical.theta -= deltaX * 0.005;
                    cameraSpherical.phi -= deltaY * 0.005;
                    
                    // Clamp vertical rotation so we don't go under board or directly top-down
                    cameraSpherical.phi = Math.max(0.2, Math.min(Math.PI / 2 - 0.1, cameraSpherical.phi));
                    
                    updateCameraPosition();
                    previousMousePosition = { x: e.clientX, y: e.clientY };
                }
            });

            container.addEventListener('mouseup', (e) => {
                isDragging = false;
                if (isClicking) {
                    handleCanvasClick(e);
                }
            });
        }

        function updateCameraPosition() {
            camera.position.x = cameraSpherical.radius * Math.sin(cameraSpherical.phi) * Math.sin(cameraSpherical.theta);
            camera.position.y = cameraSpherical.radius * Math.cos(cameraSpherical.phi);
            camera.position.z = cameraSpherical.radius * Math.sin(cameraSpherical.phi) * Math.cos(cameraSpherical.theta);
            camera.lookAt(0, 0, 0);
        }

        function handleCanvasClick(event) {
            if (state.gameOver) return;

            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Intersect both pieces and squares
            const activePieceMeshes = pieces.filter(p => p.userData.active);
            const intersects = raycaster.intersectObjects([...activePieceMeshes, ...boardSquares]);

            if (intersects.length > 0) {
                const hitObj = intersects[0].object;

                if (hitObj.userData.isPiece) {
                    handlePieceClick(hitObj);
                } else if (hitObj.userData.isSquare) {
                    handleSquareClick(hitObj.userData.r, hitObj.userData.c);
                }
            } else {
                deselectPiece();
            }
        }

        function handlePieceClick(pieceMesh) {
            const data = pieceMesh.userData;

            // If selected enemy piece while we have one selected -> Capture move
            if (state.selectedPiece && data.color !== state.turn) {
                handleSquareClick(data.r, data.c);
                return;
            }

            // Select own piece
            if (data.color === state.turn) {
                if (state.selectedPiece === pieceMesh) {
                    deselectPiece();
                } else {
                    state.selectedPiece = pieceMesh;
                    selectionIndicator.position.set(pieceMesh.position.x, 0.06, pieceMesh.position.z);
                    selectionIndicator.visible = true;
                }
            }
        }

        function deselectPiece() {
            state.selectedPiece = null;
            selectionIndicator.visible = false;
        }

        function handleSquareClick(targetR, targetC) {
            if (!state.selectedPiece) return;

            const selectedData = state.selectedPiece.userData;
            let capturedKingColor = null;

            // Check for capture
            const targetPieceIndex = pieces.findIndex(p => p.userData.active && p.userData.r === targetR && p.userData.c === targetC);
            if (targetPieceIndex !== -1) {
                const targetPiece = pieces[targetPieceIndex];
                if (targetPiece.userData.color === state.turn) return; // Cannot capture own
                
                if (targetPiece.userData.isKing) capturedKingColor = targetPiece.userData.color;
                
                // Animate captured piece out (shrink & remove)
                targetPiece.userData.active = false;
                addTween(targetPiece.scale, { x: 0, y: 0, z: 0 }, 200, () => {
                    scene.remove(targetPiece);
                });
            }

            // Update logical position
            selectedData.r = targetR;
            selectedData.c = targetC;

            // Animate moving piece (Parabolic Arc)
            const startPos = state.selectedPiece.position.clone();
            const endX = targetC - 3.5;
            const endZ = targetR - 3.5;
            const duration = 300;

            const movingPiece = state.selectedPiece;
            deselectPiece();

            addTween({ p: 0 }, { p: 1 }, duration, null, (obj) => {
                const progress = obj.p;
                movingPiece.position.x = startPos.x + (endX - startPos.x) * progress;
                movingPiece.position.z = startPos.z + (endZ - startPos.z) * progress;
                // Add jump height (parabola)
                movingPiece.position.y = 0.125 + Math.sin(progress * Math.PI) * 1.5;
            });

            // Check Win Condition
            if (capturedKingColor) {
                const winnerName = capturedKingColor === 'b' ? 'White' : 'Black';
                setTimeout(() => endGame('Checkmate', winnerName), duration);
                return;
            }

            // Toggle Turn
            state.turn = state.turn === 'w' ? 'b' : 'w';
        }

        /**
         * ANIMATION ENGINE (Custom Tweening)
         */
        function addTween(targetObj, endProps, duration, onComplete, onUpdate) {
            const startProps = {};
            for (let key in endProps) startProps[key] = targetObj[key];
            
            activeTweens.push({
                target: targetObj,
                start: startProps,
                end: endProps,
                duration: duration,
                startTime: performance.now(),
                onComplete: onComplete,
                onUpdate: onUpdate
            });
        }

        function updateTweens(time) {
            for (let i = activeTweens.length - 1; i >= 0; i--) {
                const t = activeTweens[i];
                let progress = (time - t.startTime) / t.duration;
                
                if (progress >= 1) {
                    progress = 1;
                    for (let key in t.end) t.target[key] = t.end[key];
                    if (t.onUpdate) t.onUpdate(t.target);
                    if (t.onComplete) t.onComplete();
                    activeTweens.splice(i, 1);
                } else {
                    // Ease out cubic
                    const ease = 1 - Math.pow(1 - progress, 3);
                    for (let key in t.end) {
                        t.target[key] = t.start[key] + (t.end[key] - t.start[key]) * ease;
                    }
                    if (t.onUpdate) t.onUpdate(t.target);
                }
            }
        }

        /**
         * GAME OVER & POSTMESSAGE
         */
        function endGame(reason, winnerColorStr) {
            if (state.gameOver) return;
            state.gameOver = true;

            // Show Overlay
            const overlay = document.getElementById('game-over-screen');
            document.getElementById('go-title').textContent = reason;
            document.getElementById('go-subtitle').textContent = `${winnerColorStr} WINS`;
            overlay.classList.add('show');

            // Trigger Requirement 4
            window.parent.postMessage({
                type: 'SJ_GAME_OVER',
                winner: winnerColorStr,
                timeRemaining: 0, // Fallback since timers are removed
                gameName: 'SJ_BulletChess'
            }, '*');
        }

        /**
         * RENDER LOOP
         */
        function animate(timestamp = performance.now()) {
            requestAnimationFrame(animate);

            // Update custom tween engine (smooth piece gliding)
            updateTweens(timestamp);

            // Pulse effect for selection indicator
            if (selectionIndicator.visible) {
                selectionIndicator.scale.setScalar(1 + Math.sin(timestamp * 0.005) * 0.1);
            }

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
