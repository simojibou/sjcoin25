<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ترقية وتصحيح عقد SJ COIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/@tonconnect/ui@latest/dist/tonconnect-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tonweb/0.0.66/tonweb.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0c0d12; color: #ffffff; }
        .log-ok  { color: #4ade80; }
        .log-err { color: #f87171; }
        .log-inf { color: #60a5fa; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4">

<div class="max-w-xl mx-auto w-full bg-[#12141c] border border-gray-800 rounded-2xl p-6 mt-10 shadow-xl">
    <div class="flex flex-col items-center text-center gap-3 mb-6">
        <h1 class="text-xl font-black">ترقية وتصحيح عقد SJ COIN</h1>
    </div>

    <div class="flex justify-center mb-6">
        <div id="ton-connect-btn"></div>
    </div>

    <div class="space-y-4">
        <div>
            <label class="block text-xs text-gray-400 mb-1">عنوان عقد العملة</label>
            <input type="text" id="master-address" readonly value="EQD1TIRrCeCdO04h4V14Lt2L-DZUrnFwHhAcoZp0o9yFmSBe" class="w-full bg-gray-950 border border-gray-800 p-3 rounded-xl text-xs font-mono text-gray-300 focus:outline-none">
        </div>

        <div>
            <label class="block text-xs text-gray-400 mb-1">رابط الـ JSON</label>
            <input type="text" id="json-url" value="https://raw.githubusercontent.com/simojibou/sjcoin25/main/sjcoin.json" class="w-full bg-gray-950 border border-gray-800 p-3 rounded-xl text-xs font-mono text-yellow-500 focus:outline-none">
        </div>

        <div class="bg-gray-950 p-3 rounded-xl border border-gray-800 text-[10px] font-mono space-y-1">
            <span class="text-xs font-bold text-gray-300 block mb-2">🖥️ Console</span>
            <div>الحالة: <span id="log-status" class="log-inf">بانتظار الربط...</span></div>
        </div>

        <button id="btn-submit" onclick="updateToOffchain()" disabled
                class="w-full py-4 rounded-xl font-bold text-sm bg-gray-700 text-gray-400 cursor-not-allowed">
            <span id="btn-text">يرجى ربط المحفظة أولاً</span>
        </button>
    </div>
</div>

<script>
    const MASTER_ADDRESS = "EQD1TIRrCeCdO04h4V14Lt2L-DZUrnFwHhAcoZp0o9yFmSBe";
    const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({ manifestUrl: "https://raw.githubusercontent.com/simojibou/sjcoin25/refs/heads/main/tonconnect-manifest.json", buttonRootId: 'ton-connect-btn' });

    async function buildChangeContentBoc(url) {
        const cell = new TonWeb.boc.Cell();
        cell.bits.writeUint(0x57aa0a5a, 32); 
        cell.bits.writeUint(0, 64); 
        
        const contentCell = new TonWeb.boc.Cell();
        contentCell.bits.writeUint(0x01, 8);
        const urlBytes = new TextEncoder().encode(url);
        contentCell.bits.writeBytes(Array.from(urlBytes));
        
        cell.refs.push(contentCell);
        const boc = await cell.toBoc();
        return TonWeb.utils.bytesToBase64(boc);
    }

    tonConnectUI.onStatusChange(async (wallet) => {
        const btn = document.getElementById("btn-submit");
        const status = document.getElementById("log-status");
        if (wallet) {
            btn.disabled = false;
            btn.className = "w-full py-4 rounded-xl font-bold text-sm bg-yellow-500 text-black";
            document.getElementById("btn-text").innerText = "إرسال الترقية الآن";
            status.innerText = "جاهز للإرسال";
        } else {
            btn.disabled = true;
            btn.className = "w-full py-4 rounded-xl font-bold text-sm bg-gray-700 text-gray-400";
            document.getElementById("btn-text").innerText = "يرجى ربط المحفظة";
        }
    });

    async function updateToOffchain() {
        const url = document.getElementById("json-url").value;
        try {
            const payload = await buildChangeContentBoc(url);
            await tonConnectUI.sendTransaction({
                validUntil: Math.floor(Date.now() / 1000) + 600,
                messages: [{ address: MASTER_ADDRESS, amount: "50000000", payload: payload }]
            });
            alert("تم إرسال المعاملة بنجاح!");
        } catch (e) {
            alert("خطأ: " + e.message);
        }
    }
</script>
</body>
</html>
