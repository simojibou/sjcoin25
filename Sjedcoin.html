<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SJ COIN Metadata Upgrade (FIXED v2)</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.js"></script>
<link rel="stylesheet" href="https://unpkg.com/@tonconnect/ui@2.0.9/dist/tonconnect-ui.min.css"/>

<style>
body{ font-family:'Cairo',sans-serif; background:#0c0d12; color:white; }
.log-ok{ color:#4ade80; }
.log-err{ color:#f87171; }
.log-inf{ color:#60a5fa; }
</style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

<div class="w-full max-w-xl bg-[#12141c] border border-gray-800 rounded-2xl p-6">
    <h1 class="text-xl font-bold text-center mb-4">SJ COIN Metadata Upgrade (FIXED v2)</h1>
    <div id="ton-connect-btn" class="flex justify-center mb-5"></div>

    <label class="text-xs text-gray-400 block mb-1">JSON Metadata URL</label>
    <input id="url" class="w-full p-3 bg-black border border-gray-700 rounded-xl text-yellow-400 text-xs" value="https://raw.githubusercontent.com/simojibou/sjcoin25/main/sjcoin.json">

    <div class="mt-4 bg-black p-3 rounded-xl border border-gray-800 text-xs space-y-1">
        <div>Status: <span id="status" class="log-inf">Waiting...</span></div>
        <div>Payload: <span id="payload" class="log-inf">---</span></div>
    </div>

    <button id="btn" disabled onclick="sendTx()" class="w-full mt-4 py-3 rounded-xl bg-gray-700 text-gray-400 font-bold">
        Connect Wallet First
    </button>
</div>

<script type="module">
import { beginCell, toNano, Address } from "https://esm.sh/@ton/core";

const MASTER = Address.parse("EQD1TIRrCeCdO04h4V14Lt2L-DZqSJ8x5Vjhq-JU282mDVo2");

const tonConnectUI = new TON_CONNECT_UI.TonConnectUI({
  manifestUrl: "https://raw.githubusercontent.com/simojibou/sjcoin25/main/tonconnect-manifest.json",
  buttonRootId: "ton-connect-btn"
});

tonConnectUI.onStatusChange(wallet => {
  const btn = document.getElementById("btn");
  if (wallet) {
    btn.disabled = false;
    btn.className = "w-full mt-4 py-3 rounded-xl bg-yellow-500 hover:bg-yellow-600 text-black font-bold";
    btn.innerText = "Update Metadata";
  } else {
    btn.disabled = true;
    btn.className = "w-full mt-4 py-3 rounded-xl bg-gray-700 text-gray-400 font-bold";
    btn.innerText = "Connect Wallet First";
  }
});

function buildPayload(url){
  const content = beginCell()
    .storeUint(0, 8) 
    .storeStringTail(url)
    .endCell();

  const body = beginCell()
    .storeUint(0x7e8764ef, 32)
    .storeRef(content)
    .endCell();

  return body.toBoc().toString("base64");
}

async function sendTx(){
  const url = document.getElementById("url").value.trim();
  const payload = buildPayload(url);
  
  document.getElementById("payload").innerText = payload.slice(0, 30) + "...";
  document.getElementById("status").innerText = "Sending...";

  const tx = {
    validUntil: Math.floor(Date.now()/1000) + 600,
    messages: [{
        address: MASTER.toString(),
        amount: toNano("0.1").toString(),
        payload: payload
    }]
  };

  try {
    await tonConnectUI.sendTransaction(tx);
    document.getElementById("status").innerText = "✅ Transaction Sent!";
    document.getElementById("status").className = "log-ok";
  } catch (e) {
    document.getElementById("status").innerText = "❌ Failed: " + e.message;
    document.getElementById("status").className = "log-err";
  }
}
window.sendTx = sendTx;
</script>
</body>
</html>
