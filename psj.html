<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hyper Pool - SJ Billiards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');
        
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
            touch-action: none; /* Prevent scrolling on drag */
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, #1a1a24 0%, #050508 100%);
        }

        canvas {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7), 0 0 0 15px #1c1008, 0 0 0 20px #382211;
            border-radius: 20px;
            max-width: 95vw;
            max-height: 90vh;
            background-color: #1a5c32; /* Fallback felt color */
            cursor: crosshair;
        }

        /* UI Overlays */
        .overlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(8px);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .text-gradient-gold {
            background: linear-gradient(135deg, #fde047 0%, #d97706 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .btn-gold {
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
            border: 1px solid #fcd34d;
            box-shadow: 0 4px 15px rgba(217, 119, 6, 0.4);
            transition: all 0.2s;
        }
        
        .btn-gold:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(217, 119, 6, 0.6);
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
        }

        .btn-gold:active {
            transform: translateY(1px);
        }

        /* Leaderboard table styles */
        .lb-row {
            transition: background 0.2s;
        }
        .lb-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .rank-1 { color: #fbbf24; font-weight: bold; text-shadow: 0 0 10px rgba(251, 191, 36, 0.5); }
        .rank-2 { color: #94a3b8; font-weight: bold; text-shadow: 0 0 10px rgba(148, 163, 184, 0.5); }
        .rank-3 { color: #b45309; font-weight: bold; text-shadow: 0 0 10px rgba(180, 83, 9, 0.5); }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 5;
            pointer-events: none;
        }

        .hud-box {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 8px 24px;
            border-radius: 999px;
            font-variant-numeric: tabular-nums;
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- HUD -->
        <div id="hud" class="hidden">
            <div class="hud-box">
                <span class="text-gray-400 text-sm mr-2 uppercase tracking-wider">Time</span>
                <span id="hud-time" class="text-xl font-bold text-white">00:00</span>
            </div>
            <div class="hud-box">
                <span class="text-gray-400 text-sm mr-2 uppercase tracking-wider">Shots</span>
                <span id="hud-shots" class="text-xl font-bold text-white">0</span>
            </div>
            <div class="hud-box">
                <span class="text-gray-400 text-sm mr-2 uppercase tracking-wider">Balls</span>
                <span id="hud-balls" class="text-xl font-bold text-yellow-400">6</span>
            </div>
        </div>

        <!-- The Table -->
        <canvas id="pool-canvas"></canvas>

        <!-- Start Screen & Leaderboard -->
        <div id="screen-start" class="overlay active">
            <div class="glass-panel p-8 w-full max-w-2xl mx-4 flex flex-col md:flex-row gap-8">
                <!-- Left: Title & Play -->
                <div class="flex-1 flex flex-col justify-center items-center md:items-start text-center md:text-left">
                    <h1 class="text-5xl font-black mb-2 tracking-tight">HYPER <span class="text-gradient-gold">POOL</span></h1>
                    <p class="text-gray-400 mb-8 max-w-xs">Clear the table in the fastest time with the fewest shots.</p>
                    <button id="btn-start" class="btn-gold text-white font-bold py-4 px-10 rounded-full text-xl w-full md:w-auto flex items-center justify-center gap-3">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg>
                        Play Now
                    </button>
                </div>
                
                <!-- Right: Hall of Fame -->
                <div class="flex-1 bg-black/40 rounded-xl border border-white/5 p-5">
                    <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-gray-200 uppercase tracking-widest text-sm border-b border-white/10 pb-3">
                        <svg class="w-5 h-5 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                        Hall of Fame
                    </h2>
                    <div class="overflow-hidden">
                        <table class="w-full text-left text-sm">
                            <thead>
                                <tr class="text-gray-500 border-b border-white/5">
                                    <th class="pb-2 font-medium">Rank</th>
                                    <th class="pb-2 font-medium">Player</th>
                                    <th class="pb-2 font-medium text-right">Score</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboard-body">
                                <!-- JS populated -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Over Screen -->
        <div id="screen-gameover" class="overlay">
            <div class="glass-panel p-10 text-center max-w-md mx-4 transform scale-95 transition-transform duration-300">
                <h2 class="text-4xl font-black mb-2 text-gradient-gold">TABLE CLEARED!</h2>
                <p class="text-gray-300 mb-6">Excellent performance.</p>
                
                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-black/40 rounded-lg p-4 border border-white/5">
                        <div class="text-gray-400 text-sm uppercase tracking-wider mb-1">Time</div>
                        <div id="go-time" class="text-2xl font-bold">0:00</div>
                    </div>
                    <div class="bg-black/40 rounded-lg p-4 border border-white/5">
                        <div class="text-gray-400 text-sm uppercase tracking-wider mb-1">Shots</div>
                        <div id="go-shots" class="text-2xl font-bold">0</div>
                    </div>
                    <div class="col-span-2 bg-gradient-to-br from-yellow-900/30 to-black rounded-lg p-4 border border-yellow-500/20">
                        <div class="text-yellow-500 text-sm uppercase tracking-wider mb-1">Final Score</div>
                        <div id="go-score" class="text-4xl font-black text-gradient-gold">0</div>
                    </div>
                </div>

                <button id="btn-continue" class="btn-gold text-white font-bold py-4 px-8 rounded-full text-lg w-full shadow-lg">
                    Submit & Continue
                </button>
            </div>
        </div>
    </div>

    <script>
        /**
         * HYPER POOL - Physics and Rendering Engine
         */
        const canvas = document.getElementById('pool-canvas');
        const ctx = canvas.getContext('2d', { alpha: false }); // Optimize
        
        // Logical resolution (internal physics/rendering coordinates)
        const GAME_WIDTH = 1000;
        const GAME_HEIGHT = 500;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;

        // Constants
        const PAD = 50; // Cushion thickness
        const POCKET_RADIUS = 28;
        const BALL_RADIUS = 14;
        const FRICTION = 0.988;
        const MIN_VELOCITY = 0.04;
        const CUSHION_RESTITUTION = 0.85;
        const MAX_POWER = 35;
        const AIM_MULTIPLIER = 0.15;

        // Pockets positions
        const pockets = [
            {x: PAD, y: PAD}, {x: GAME_WIDTH / 2, y: PAD - 5}, {x: GAME_WIDTH - PAD, y: PAD},
            {x: PAD, y: GAME_HEIGHT - PAD}, {x: GAME_WIDTH / 2, y: GAME_HEIGHT - PAD + 5}, {x: GAME_WIDTH - PAD, y: GAME_HEIGHT - PAD}
        ];

        // Colors
        const BALL_COLORS = [
            '#ffffff', // 0: Cue (White)
            '#ef4444', // 1: Red
            '#eab308', // 2: Yellow
            '#3b82f6', // 3: Blue
            '#a855f7', // 4: Purple
            '#f97316', // 5: Orange
            '#22c55e', // 6: Green
            '#111827'  // 7: Black
        ];

        // State
        let balls = [];
        let particles = [];
        let isAiming = false;
        let aimStartPos = null;
        let aimCurrentPos = null;
        let gameState = 'MENU'; // MENU, PLAYING, GAMEOVER
        
        // Stats
        let shots = 0;
        let startTime = 0;
        let playTime = 0;
        let isMoving = false;
        let timeInterval;

        class Vector {
            constructor(x, y) { this.x = x; this.y = y; }
            add(v) { return new Vector(this.x + v.x, this.y + v.y); }
            sub(v) { return new Vector(this.x - v.x, this.y - v.y); }
            mult(n) { return new Vector(this.x * n, this.y * n); }
            mag() { return Math.hypot(this.x, this.y); }
            normalize() {
                let m = this.mag();
                return m === 0 ? new Vector(0, 0) : new Vector(this.x / m, this.y / m);
            }
            dot(v) { return this.x * v.x + this.y * v.y; }
        }

        class Ball {
            constructor(x, y, colorIdx, isCue = false) {
                this.pos = new Vector(x, y);
                this.vel = new Vector(0, 0);
                this.radius = BALL_RADIUS;
                this.mass = 1;
                this.colorIdx = colorIdx;
                this.isCue = isCue;
                this.active = true;
            }

            update() {
                if (!this.active) return;
                
                // Apply friction
                this.vel = this.vel.mult(FRICTION);
                if (this.vel.mag() < MIN_VELOCITY) {
                    this.vel = new Vector(0, 0);
                }

                // Move
                this.pos = this.pos.add(this.vel);

                // Cushion Collisions
                if (this.pos.x - this.radius < PAD) {
                    this.pos.x = PAD + this.radius;
                    this.vel.x *= -CUSHION_RESTITUTION;
                    spawnParticles(this.pos.x - this.radius, this.pos.y, 3, '#c2410c');
                } else if (this.pos.x + this.radius > GAME_WIDTH - PAD) {
                    this.pos.x = GAME_WIDTH - PAD - this.radius;
                    this.vel.x *= -CUSHION_RESTITUTION;
                    spawnParticles(this.pos.x + this.radius, this.pos.y, 3, '#c2410c');
                }

                if (this.pos.y - this.radius < PAD) {
                    this.pos.y = PAD + this.radius;
                    this.vel.y *= -CUSHION_RESTITUTION;
                    spawnParticles(this.pos.x, this.pos.y - this.radius, 3, '#c2410c');
                } else if (this.pos.y + this.radius > GAME_HEIGHT - PAD) {
                    this.pos.y = GAME_HEIGHT - PAD - this.radius;
                    this.vel.y *= -CUSHION_RESTITUTION;
                    spawnParticles(this.pos.x, this.pos.y + this.radius, 3, '#c2410c');
                }

                // Pocket Check
                for (let p of pockets) {
                    let d = Math.hypot(this.pos.x - p.x, this.pos.y - p.y);
                    if (d < POCKET_RADIUS) {
                        this.active = false;
                        this.vel = new Vector(0,0);
                        if (this.isCue) {
                            // Scratch
                            setTimeout(() => this.resetCue(), 500);
                        } else {
                            updateHUD();
                            checkWinCondition();
                        }
                        spawnParticles(p.x, p.y, 10, BALL_COLORS[this.colorIdx]);
                        break;
                    }
                }
            }

            resetCue() {
                this.pos = new Vector(GAME_WIDTH * 0.25, GAME_HEIGHT / 2);
                this.vel = new Vector(0,0);
                this.active = true;
                shots += 1; // Penalty shot
                updateHUD();
            }

            draw(ctx) {
                if (!this.active) return;

                // Shadow
                ctx.beginPath();
                ctx.arc(this.pos.x + 3, this.pos.y + 4, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(0,0,0,0.4)';
                ctx.fill();

                // Ball Base Gradient
                let grad = ctx.createRadialGradient(
                    this.pos.x - this.radius * 0.3, this.pos.y - this.radius * 0.3, this.radius * 0.1,
                    this.pos.x, this.pos.y, this.radius
                );
                grad.addColorStop(0, '#ffffff'); // highlight
                grad.addColorStop(0.3, BALL_COLORS[this.colorIdx]);
                grad.addColorStop(1, '#000000'); // shadow edge

                ctx.beginPath();
                ctx.arc(this.pos.x, this.pos.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = grad;
                ctx.fill();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.pos = new Vector(x, y);
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 2 + 1;
                this.vel = new Vector(Math.cos(angle) * speed, Math.sin(angle) * speed);
                this.life = 1.0;
                this.color = color;
            }
            update() {
                this.pos = this.pos.add(this.vel);
                this.life -= 0.03;
            }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.globalAlpha = this.life;
                ctx.beginPath();
                ctx.arc(this.pos.x, this.pos.y, 2, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function spawnParticles(x, y, count, color = '#ffffff') {
            for(let i=0; i<count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function initGame() {
            balls = [];
            particles = [];
            shots = 0;
            playTime = 0;
            startTime = Date.now();
            gameState = 'PLAYING';
            
            clearInterval(timeInterval);
            timeInterval = setInterval(() => {
                if (gameState === 'PLAYING') {
                    playTime = Math.floor((Date.now() - startTime) / 1000);
                    updateHUD();
                }
            }, 1000);

            // Add Cue Ball
            balls.push(new Ball(GAME_WIDTH * 0.25, GAME_HEIGHT / 2, 0, true));

            // Add Object Balls (Triangle)
            let startX = GAME_WIDTH * 0.65;
            let startY = GAME_HEIGHT / 2;
            let rows = 3; // 6 balls
            let colIdx = 1;
            
            for (let row = 0; row < rows; row++) {
                for (let col = 0; col <= row; col++) {
                    let bx = startX + row * (BALL_RADIUS * Math.sqrt(3) + 1);
                    let by = startY - (row * BALL_RADIUS) + (col * BALL_RADIUS * 2.05);
                    balls.push(new Ball(bx, by, colIdx++));
                }
            }

            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('screen-start').classList.remove('active');
            updateHUD();
            
            requestAnimationFrame(gameLoop);
        }

        function resolveCollisions() {
            for (let i = 0; i < balls.length; i++) {
                for (let j = i + 1; j < balls.length; j++) {
                    let b1 = balls[i];
                    let b2 = balls[j];
                    if (!b1.active || !b2.active) continue;

                    let delta = b2.pos.sub(b1.pos);
                    let dist = delta.mag();
                    let minDist = b1.radius + b2.radius;

                    if (dist < minDist) {
                        // Resolve overlap
                        let overlap = minDist - dist;
                        let normal = delta.normalize();
                        let moveVec = normal.mult(overlap / 2);
                        b1.pos = b1.pos.sub(moveVec);
                        b2.pos = b2.pos.add(moveVec);

                        // Resolve velocity
                        let relVel = b1.vel.sub(b2.vel);
                        let velAlongNormal = relVel.dot(normal);

                        // Do not resolve if velocities are separating
                        if (velAlongNormal > 0) continue;

                        let restitution = 0.95; // Elasticity
                        let impulseMag = -(1 + restitution) * velAlongNormal;
                        impulseMag /= (1/b1.mass + 1/b2.mass);

                        let impulse = normal.mult(impulseMag);
                        b1.vel = b1.vel.add(impulse.mult(1/b1.mass));
                        b2.vel = b2.vel.sub(impulse.mult(1/b2.mass));

                        // Effects
                        let impactForce = Math.abs(velAlongNormal);
                        if (impactForce > 2) {
                            spawnParticles((b1.pos.x+b2.pos.x)/2, (b1.pos.y+b2.pos.y)/2, Math.min(10, Math.floor(impactForce)), '#facc15');
                        }
                    }
                }
            }
        }

        function drawTable() {
            // Fill background (Floor)
            ctx.fillStyle = '#050508';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // Wood Border
            ctx.fillStyle = '#2c1608';
            ctx.beginPath();
            ctx.roundRect(10, 10, GAME_WIDTH - 20, GAME_HEIGHT - 20, 30);
            ctx.fill();

            // Inner Shadow/Detail for wood
            ctx.strokeStyle = '#4a2610';
            ctx.lineWidth = 5;
            ctx.stroke();

            // Felt (Play area)
            let feltGrad = ctx.createRadialGradient(GAME_WIDTH/2, GAME_HEIGHT/2, 50, GAME_WIDTH/2, GAME_HEIGHT/2, GAME_WIDTH/1.5);
            feltGrad.addColorStop(0, '#218242'); // lighter center
            feltGrad.addColorStop(1, '#0e421e'); // dark edges

            ctx.fillStyle = feltGrad;
            ctx.fillRect(PAD, PAD, GAME_WIDTH - PAD * 2, GAME_HEIGHT - PAD * 2);

            // Draw Pockets
            ctx.fillStyle = '#0a0a0a';
            for (let p of pockets) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, POCKET_RADIUS, 0, Math.PI * 2);
                ctx.fill();
                // inner shadow
                ctx.strokeStyle = 'rgba(0,0,0,0.8)';
                ctx.lineWidth = 4;
                ctx.stroke();
            }

            // Start line
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(GAME_WIDTH * 0.25, PAD);
            ctx.lineTo(GAME_WIDTH * 0.25, GAME_HEIGHT - PAD);
            ctx.stroke();
            
            // Start dot
            ctx.fillStyle = 'rgba(255,255,255,0.4)';
            ctx.beginPath();
            ctx.arc(GAME_WIDTH * 0.25, GAME_HEIGHT / 2, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawAiming() {
            if (!isAiming || isMoving || !aimStartPos || !aimCurrentPos || !balls[0].active) return;
            
            let cue = balls[0];
            
            // Aim vector is from drag start to current mouse (reversed)
            let dragVec = aimCurrentPos.sub(aimStartPos);
            
            // If dragging too little, don't show
            if (dragVec.mag() < 5) return;

            // Cap power
            let power = Math.min(dragVec.mag() * AIM_MULTIPLIER, MAX_POWER);
            let direction = dragVec.normalize().mult(-1); // Reverse direction

            // Draw Line
            ctx.beginPath();
            ctx.moveTo(cue.pos.x, cue.pos.y);
            
            // Raycast roughly
            let endPos = cue.pos.add(direction.mult(power * 15)); 
            
            ctx.lineTo(endPos.x, endPos.y);
            
            // Line styling
            ctx.strokeStyle = `rgba(255, 255, 255, ${Math.min(0.8, power / 10)})`;
            ctx.lineWidth = 2;
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]); // reset

            // Power indicator circle around cue ball
            ctx.beginPath();
            ctx.arc(cue.pos.x, cue.pos.y, BALL_RADIUS + 5 + (power/2), 0, Math.PI * 2);
            ctx.strokeStyle = `hsla(${120 - (power/MAX_POWER)*120}, 100%, 50%, 0.5)`;
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        function gameLoop() {
            if (gameState !== 'PLAYING') return;

            // Check if balls are moving
            isMoving = false;
            for (let b of balls) {
                if (b.active && b.vel.mag() > 0) {
                    isMoving = true;
                    b.update();
                }
            }

            resolveCollisions();

            // Particles update
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            // Render
            drawTable();
            
            for (let b of balls) b.draw(ctx);
            for (let p of particles) p.draw(ctx);
            
            drawAiming();

            requestAnimationFrame(gameLoop);
        }

        // Input Handling
        function getMousePos(evt) {
            let rect = canvas.getBoundingClientRect();
            let scaleX = canvas.width / rect.width;
            let scaleY = canvas.height / rect.height;
            let clientX = evt.clientX !== undefined ? evt.clientX : evt.touches[0].clientX;
            let clientY = evt.clientY !== undefined ? evt.clientY : evt.touches[0].clientY;
            
            return new Vector(
                (clientX - rect.left) * scaleX,
                (clientY - rect.top) * scaleY
            );
        }

        function onPointerDown(e) {
            if (gameState !== 'PLAYING' || isMoving || !balls[0].active) return;
            e.preventDefault(); // Prevent scrolling
            isAiming = true;
            aimStartPos = getMousePos(e);
            aimCurrentPos = aimStartPos;
        }

        function onPointerMove(e) {
            if (!isAiming) return;
            e.preventDefault();
            aimCurrentPos = getMousePos(e);
        }

        function onPointerUp(e) {
            if (!isAiming) return;
            isAiming = false;
            e.preventDefault();
            
            let dragVec = aimCurrentPos.sub(aimStartPos);
            if (dragVec.mag() > 5) {
                let power = Math.min(dragVec.mag() * AIM_MULTIPLIER, MAX_POWER);
                let direction = dragVec.normalize().mult(-1);
                
                balls[0].vel = direction.mult(power);
                shots++;
                updateHUD();
            }
            aimStartPos = null;
            aimCurrentPos = null;
        }

        canvas.addEventListener('mousedown', onPointerDown);
        canvas.addEventListener('mousemove', onPointerMove);
        window.addEventListener('mouseup', onPointerUp);
        
        canvas.addEventListener('touchstart', onPointerDown, {passive: false});
        canvas.addEventListener('touchmove', onPointerMove, {passive: false});
        window.addEventListener('touchend', onPointerUp);

        // UI & Logic
        function formatTime(seconds) {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function updateHUD() {
            document.getElementById('hud-time').innerText = formatTime(playTime);
            document.getElementById('hud-shots').innerText = shots;
            
            let activeObjBalls = balls.filter(b => !b.isCue && b.active).length;
            document.getElementById('hud-balls').innerText = activeObjBalls;
        }

        function calculateScore() {
            // Base 10000. Deduct points for time and shots.
            let timePenalty = playTime * 15;
            let shotPenalty = shots * 150;
            let score = 10000 - timePenalty - shotPenalty;
            return Math.max(500, Math.floor(score)); // Minimum 500 points for finishing
        }

        function checkWinCondition() {
            let activeObjBalls = balls.filter(b => !b.isCue && b.active).length;
            if (activeObjBalls === 0) {
                gameState = 'GAMEOVER';
                clearInterval(timeInterval);
                
                let finalScore = calculateScore();
                
                // Show Game Over Screen
                document.getElementById('hud').classList.add('hidden');
                document.getElementById('screen-gameover').classList.add('active');
                
                document.getElementById('go-time').innerText = formatTime(playTime);
                document.getElementById('go-shots').innerText = shots;
                
                // Animate score
                let s = 0;
                let inc = Math.max(1, Math.floor(finalScore / 60));
                let anim = setInterval(() => {
                    s += inc;
                    if (s >= finalScore) {
                        s = finalScore;
                        clearInterval(anim);
                    }
                    document.getElementById('go-score').innerText = s;
                }, 16);
                
                // Store on button for postMessage
                document.getElementById('btn-continue').dataset.score = finalScore;
            }
        }

        // Leaderboard population
        function populateLeaderboard() {
            let lbData = window.SJ_LEADERBOARD;
            
            // Fallback mock data if none provided by parent
            if (!lbData || !Array.isArray(lbData) || lbData.length === 0) {
                lbData = [
                    { name: "ProHustler", score: 9240, shots: 6, time: "0:42" },
                    { name: "CueMaster", score: 8850, shots: 8, time: "0:55" },
                    { name: "FeltShark", score: 8100, shots: 10, time: "1:12" },
                    { name: "LuckyShot", score: 7600, shots: 12, time: "1:30" },
                    { name: "Rookie", score: 6200, shots: 18, time: "2:05" }
                ];
            }

            // Sort by score descending just in case
            lbData.sort((a, b) => b.score - a.score);

            const tbody = document.getElementById('leaderboard-body');
            tbody.innerHTML = '';

            lbData.slice(0, 5).forEach((entry, index) => {
                let rankClass = '';
                let rankText = index + 1;
                if (index === 0) rankClass = 'rank-1';
                else if (index === 1) rankClass = 'rank-2';
                else if (index === 2) rankClass = 'rank-3';

                tbody.innerHTML += `
                    <tr class="lb-row border-b border-white/5 last:border-0">
                        <td class="py-3 ${rankClass}">#${rankText}</td>
                        <td class="py-3 font-medium text-gray-200">
                            ${entry.name}
                            <div class="text-xs text-gray-500 font-normal mt-0.5">${entry.shots} shots | ${entry.time}</div>
                        </td>
                        <td class="py-3 text-right font-bold text-yellow-500">${entry.score.toLocaleString()}</td>
                    </tr>
                `;
            });
        }

        // Initialization
        window.addEventListener('load', () => {
            drawTable(); // Draw initial empty table
            populateLeaderboard();
        });

        document.getElementById('btn-start').addEventListener('click', initGame);

        document.getElementById('btn-continue').addEventListener('click', function() {
            let score = parseInt(this.dataset.score, 10);
            
            // Post message to parent container
            if (window.parent) {
                window.parent.postMessage({
                    type: 'SJ_GAME_OVER',
                    score: score,
                    gameName: 'SJ_Billiards'
                }, '*');
            }
            
            // Reset visually
            this.innerText = "Submitted!";
            this.classList.add('opacity-50', 'cursor-not-allowed');
            this.disabled = true;
        });

    </script>
</body>
</html>
